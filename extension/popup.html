<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        width: 240px;
        padding: 12px;
      }
      h3 {
        margin: 0 0 8px;
      }
      label {
        display: block;
        margin-top: 8px;
        font-size: 12px;
        color: #555;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 4px;
        margin-top: 2px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 6px;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #2a7a2a;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <h3>YT Music Sync</h3>
    <label for="workerUrl">Worker URL (wss://...)</label>
    <input id="workerUrl" type="text" placeholder="wss://seu-worker.workers.dev" />
    <label for="roomCode">Código da sala</label>
    <input id="roomCode" type="text" placeholder="ex: sala-secreta" />
    <button id="save">Salvar</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
