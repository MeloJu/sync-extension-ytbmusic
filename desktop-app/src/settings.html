<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YT Music Sync — Configurações</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 16px;
        margin: 0;
      }
      h3 {
        margin: 0 0 12px;
      }
      label {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        color: #555;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        margin-top: 2px;
        font-size: 13px;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 8px;
        font-size: 13px;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #2a7a2a;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <h3>YT Music Sync</h3>
    <label for="name">Seu nome</label>
    <input id="name" type="text" placeholder="ex: João" />
    <label for="workerUrl">Worker URL (wss://...)</label>
    <input id="workerUrl" type="text" placeholder="wss://seu-worker.workers.dev" />
    <label for="roomCode">Código da sala</label>
    <input id="roomCode" type="text" placeholder="ex: sala-secreta" />
    <button id="save">Salvar</button>
    <div id="status"></div>
    <script src="settings.js"></script>
  </body>
</html>
